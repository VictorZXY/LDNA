<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#333"/>
    </marker>
    <marker id="arrowT" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#148f8f"/>
    </marker>
    <linearGradient id="wgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"  stop-color="#3b7dd8"/>
      <stop offset="0.5" stop-color="#9aa0a8"/>
      <stop offset="1"  stop-color="#e0533d"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1400" height="820" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="40" font-size="27" font-weight="700" fill="#111">LDNA — learned per-edge weighting by canonical-rank gap</text>
  <text x="40" y="68" font-size="15.5" fill="#555">Each edge gets ONE learned soft weight <tspan font-style="italic">g(δ)</tspan>, a continuous function of the canonical-rank gap <tspan font-style="italic">δ = r_j − r_i</tspan>, applied to its message, then summed.</text>
  <line x1="40" y1="82" x2="1360" y2="82" stroke="#e2e2e2" stroke-width="1.5"/>

  <!-- ===== GRAPH ===== -->
  <text x="55" y="118" font-size="15" font-weight="600" fill="#333">1 · graph — node ranks r, edge gaps δ</text>

  <!-- edges (colored continuously by delta) -->
  <line x1="85" y1="200" x2="200" y2="300" stroke="#3b7dd8" stroke-width="3.5"/>
  <line x1="85" y1="335" x2="200" y2="300" stroke="#7fb0ec" stroke-width="3.5"/>
  <line x1="200" y1="165" x2="200" y2="300" stroke="#9aa0a8" stroke-width="3.5"/>
  <line x1="315" y1="200" x2="200" y2="300" stroke="#ef9b52" stroke-width="3.5"/>
  <line x1="315" y1="335" x2="200" y2="300" stroke="#e0533d" stroke-width="3.5"/>

  <!-- per-edge soft-weight pills (illustrative learned values) -->
  <g font-size="11.5" text-anchor="middle">
    <rect x="112" y="238" width="58" height="19" rx="9" fill="#3b7dd8"/><text x="141" y="251" fill="#fff">δ=-2 · g≈.85</text>
    <rect x="112" y="310" width="58" height="19" rx="9" fill="#7fb0ec"/><text x="141" y="323" fill="#173a63">δ=-1 · g≈.55</text>
    <rect x="171" y="222" width="58" height="19" rx="9" fill="#9aa0a8"/><text x="200" y="235" fill="#fff">δ=0 · g≈.40</text>
    <rect x="230" y="238" width="58" height="19" rx="9" fill="#ef9b52"/><text x="259" y="251" fill="#4a2a08">δ=+2 · g≈.70</text>
    <rect x="230" y="310" width="58" height="19" rx="9" fill="#e0533d"/><text x="259" y="323" fill="#fff">δ=+3 · g≈.95</text>
  </g>

  <!-- nodes -->
  <g font-size="15" text-anchor="middle">
    <circle cx="85"  cy="200" r="25" fill="#eef4fd" stroke="#3b7dd8" stroke-width="2.5"/><text x="85"  y="205" fill="#173a63">r=2</text>
    <circle cx="85"  cy="335" r="25" fill="#eef4fd" stroke="#7fb0ec" stroke-width="2.5"/><text x="85"  y="340" fill="#173a63">r=3</text>
    <circle cx="200" cy="165" r="25" fill="#eef0f2" stroke="#9aa0a8" stroke-width="2.5"/><text x="200" y="170" fill="#3f434a">r=4</text>
    <circle cx="315" cy="200" r="25" fill="#fdf1e6" stroke="#ef9b52" stroke-width="2.5"/><text x="315" y="205" fill="#6a3d0c">r=6</text>
    <circle cx="315" cy="335" r="25" fill="#fbe2dd" stroke="#e0533d" stroke-width="2.5"/><text x="315" y="340" fill="#8f2c1c">r=7</text>
    <circle cx="200" cy="300" r="31" fill="#fff6d6" stroke="#c9a227" stroke-width="3"/>
    <text x="200" y="298" font-weight="700" fill="#5a4a10">i</text>
    <text x="200" y="316" font-size="12.5" fill="#5a4a10">r=4</text>
  </g>

  <!-- continuity legend -->
  <text x="55" y="400" font-size="13" fill="#555">soft weight <tspan font-style="italic">g(δ)</tspan> varies continuously with δ:</text>
  <rect x="55" y="410" width="255" height="16" rx="4" fill="url(#wgrad)" stroke="#bbb"/>
  <text x="55"  y="443" font-size="11.5" fill="#777">δ ≪ 0 (before)</text>
  <text x="182" y="443" font-size="11.5" text-anchor="middle" fill="#777">δ = 0 (tie)</text>
  <text x="310" y="443" font-size="11.5" text-anchor="end" fill="#777">δ ≫ 0 (after)</text>

  <!-- ===== PER-EDGE MECHANISM ===== -->
  <text x="392" y="118" font-size="15" font-weight="600" fill="#333">2 · for each edge j → i : weight its message, then sum</text>

  <!-- delta box -->
  <rect x="392" y="150" width="168" height="50" rx="9" fill="#e8f6f5" stroke="#148f8f" stroke-width="2"/>
  <text x="476" y="172" font-size="15" text-anchor="middle" fill="#0c5c58">δᵢⱼ = rⱼ − rᵢ</text>
  <text x="476" y="190" font-size="11.5" text-anchor="middle" fill="#4a7d7a">tie-aware rank gap</text>

  <!-- arrow delta -> g -->
  <path d="M476,200 L476,224" fill="none" stroke="#148f8f" stroke-width="2.2" marker-end="url(#arrowT)"/>

  <!-- gate box -->
  <rect x="392" y="224" width="168" height="54" rx="9" fill="#ffffff" stroke="#148f8f" stroke-width="2"/>
  <text x="476" y="247" font-size="16" text-anchor="middle" font-family="monospace" fill="#0c5c58">g( δᵢⱼ )</text>
  <text x="476" y="266" font-size="11.5" text-anchor="middle" fill="#4a7d7a">tiny MLP → gate ∈ ℝᴴ</text>

  <!-- weight bar -->
  <text x="655" y="243" font-size="12" text-anchor="middle" fill="#555">soft weight</text>
  <rect x="580" y="248" width="150" height="24" rx="5" fill="url(#wgrad)" stroke="#999"/>
  <path d="M560,251 L578,251" fill="none" stroke="#148f8f" stroke-width="2.2" marker-end="url(#arrowT)"/>

  <!-- message box -->
  <rect x="392" y="315" width="338" height="50" rx="9" fill="#f4f4f6" stroke="#666" stroke-width="2"/>
  <text x="561" y="345" font-size="14.5" text-anchor="middle" font-family="monospace" fill="#333">m_ij = pre_nn([x_i, x_j, e_ij])</text>

  <!-- multiply node -->
  <circle cx="800" cy="288" r="26" fill="#fff" stroke="#148f8f" stroke-width="2.5"/>
  <text x="800" y="296" font-size="24" text-anchor="middle" fill="#0c5c58">⊙</text>
  <path d="M730,260 L774,282" fill="none" stroke="#148f8f" stroke-width="2.2" marker-end="url(#arrowT)"/>
  <path d="M730,340 L776,300" fill="none" stroke="#666" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- weighted message -->
  <path d="M826,288 L872,288" fill="none" stroke="#148f8f" stroke-width="2.4" marker-end="url(#arrowT)"/>
  <text x="800" y="345" font-size="12.5" text-anchor="middle" fill="#0c5c58">wᵢⱼ = g(δᵢⱼ) ⊙ mᵢⱼ</text>

  <!-- SUM node -->
  <circle cx="912" cy="288" r="30" fill="#e8f6f5" stroke="#148f8f" stroke-width="2.5"/>
  <text x="912" y="298" font-size="26" text-anchor="middle" fill="#0c5c58">Σ</text>
  <text x="912" y="342" font-size="12" text-anchor="middle" fill="#555">one wᵢⱼ per edge</text>
  <text x="912" y="358" font-size="12" text-anchor="middle" fill="#555">→ aggregate ∈ ℝᴴ</text>

  <!-- arrow sum -> post -->
  <path d="M942,288 L1004,288" fill="none" stroke="#333" stroke-width="2.4" marker-end="url(#arrow)"/>

  <!-- post_nn -->
  <text x="1093" y="238" font-size="14" font-weight="600" fill="#333">3 · post-MLP</text>
  <rect x="1006" y="250" width="168" height="78" rx="10" fill="#ffffff" stroke="#333" stroke-width="2"/>
  <text x="1090" y="284" font-size="16" text-anchor="middle" font-family="monospace" fill="#1f2430">post_nn</text>
  <text x="1090" y="306" font-size="13" text-anchor="middle" fill="#555">H → H'   (width unchanged)</text>

  <!-- arrow post -> out -->
  <path d="M1174,288 L1224,288" fill="none" stroke="#333" stroke-width="2.4" marker-end="url(#arrow)"/>

  <!-- out node -->
  <circle cx="1278" cy="288" r="34" fill="#e8f6ec" stroke="#2e8b57" stroke-width="3"/>
  <text x="1278" y="285" font-size="15" text-anchor="middle" font-weight="700" fill="#1f5c3a">out</text>
  <text x="1278" y="303" font-size="12.5" text-anchor="middle" fill="#1f5c3a">node i</text>

  <!-- ===== BOTTOM BAND ===== -->
  <line x1="40" y1="470" x2="1360" y2="470" stroke="#e2e2e2" stroke-width="1.5"/>

  <text x="700" y="508" font-size="18" text-anchor="middle" font-family="monospace" fill="#111">out_i  =  post_nn(  Σ_j  g(δ_ij) ⊙ m_ij  )</text>
  <text x="700" y="532" font-size="13.5" text-anchor="middle" fill="#666">δ_ij = features of (r_j − r_i) ;   recovers the current plain sum  ⇔  g ≡ const  (so it can never underperform it)</text>
  <text x="700" y="558" font-size="13" text-anchor="middle" fill="#7c4dcc">g(δ) is applied per edge BEFORE the sum, so — unlike the uniform lin_aggr — it does not fold into post_nn.</text>

  <g>
    <rect x="40" y="586" width="428" height="200" rx="12" fill="#f2fbfa" stroke="#148f8f" stroke-width="1.6"/>
    <text x="62" y="616" font-size="16" font-weight="700" fill="#0c5c58">Purest weighted aggregation</text>
    <text x="62" y="644" font-size="13.5" fill="#2b5b58">One learned soft weight g(δ) per edge, applied</text>
    <text x="62" y="666" font-size="13.5" fill="#2b5b58">to its message, summed into a single H-vector.</text>
    <text x="62" y="688" font-size="13.5" fill="#2b5b58">g is a tiny MLP (δ → ℝᴴ) that REPLACES the</text>
    <text x="62" y="710" font-size="13.5" fill="#2b5b58">dead lin_aggr → net-zero params; post_nn stays</text>
    <text x="62" y="732" font-size="13.5" fill="#2b5b58">H→H'. ≈ 5H² / layer (~1/3 PNA) — keeps LDNA's</text>
    <text x="62" y="754" font-size="13.5" fill="#2b5b58">parameter-efficiency edge over PNA.</text>

    <rect x="486" y="586" width="428" height="200" rx="12" fill="#fbf7ff" stroke="#7c4dcc" stroke-width="1.6"/>
    <text x="508" y="616" font-size="16" font-weight="700" fill="#5a2ea6">Continuous, full-resolution weighting</text>
    <text x="508" y="644" font-size="13.5" fill="#553a86">The weight varies smoothly with the rank gap</text>
    <text x="508" y="666" font-size="13.5" fill="#553a86">δ, at full resolution. It recovers the current</text>
    <text x="508" y="688" font-size="13.5" fill="#553a86">plain sum exactly when g is constant, so it</text>
    <text x="508" y="710" font-size="13.5" fill="#553a86">can only ADD capacity.</text>
    <text x="508" y="732" font-size="13.5" fill="#553a86">g depends on POSITION (rank) only, not on</text>
    <text x="508" y="754" font-size="13.5" fill="#553a86">message content — so it is not attention.</text>

    <rect x="932" y="586" width="428" height="200" rx="12" fill="#f6fbf7" stroke="#2e8b57" stroke-width="1.6"/>
    <text x="954" y="616" font-size="16" font-weight="700" fill="#1f5c3a">Sort-activated &amp; invariant</text>
    <text x="954" y="644" font-size="13.5" fill="#294">g READS the canonical rank, so the sort becomes</text>
    <text x="954" y="666" font-size="13.5" fill="#294">load-bearing — this realizes the "sort ⇒ a</text>
    <text x="954" y="688" font-size="13.5" fill="#294">permutation-invariant order-aware aggregator"</text>
    <text x="954" y="710" font-size="13.5" fill="#294">story. Tie-aware rank ⇒ tied neighbors share</text>
    <text x="954" y="732" font-size="13.5" fill="#294">δ=0 ⇒ identical weight ⇒ output invariant to</text>
    <text x="954" y="754" font-size="13.5" fill="#294">relabeling (the ppa/tie failure is handled).</text>
  </g>
</svg>
